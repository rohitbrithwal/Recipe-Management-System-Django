{% extends 'base.html' %}

{% block start %}

<h1>hey rohit</h1>

<table border="3">

<tr>
    <th>sr no</th>
    <th>name</th>
    <th>age</th>
    <th>vote</th>
</tr>

{% for i in people %}
<tr>
    <td>{{forloop.counter}}</td>
    <td>{{i.name}}</td>
    <td>{{i.age}}</td>

    <td style="color:red">
        {% if i.age >= 18 %}
        yes
        {% else %}
        no
        {% endif %}
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
